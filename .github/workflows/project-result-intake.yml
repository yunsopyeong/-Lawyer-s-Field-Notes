name: Project Result Intake

on:
  repository_dispatch:
    types: [project_result_publish]
  workflow_dispatch:
    inputs:
      title:
        description: "문서 제목"
        required: true
        type: string
      path:
        description: "저장 경로 예: incoming/2026-04-05/post.md"
        required: true
        type: string
      content:
        description: "문서 본문"
        required: true
        type: string
      base_branch:
        description: "PR 대상 브랜치"
        required: false
        default: "main"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-branch-file-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve payload
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_JSON: ${{ toJson(github.event) }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event_name = os.environ["EVENT_NAME"]
          event = json.loads(os.environ["EVENT_JSON"])

          if event_name == "repository_dispatch":
              payload = event.get("client_payload", {})
          else:
              payload = event.get("inputs", {})

          result = {
              "title": payload.get("title", "Untitled project result"),
              "path": payload.get("path", "incoming/project-result.md"),
              "content": payload.get("content", ""),
              "base_branch": payload.get("base_branch") or "main"
          }

          Path(".payload.json").write_text(json.dumps(result, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Create branch name
        run: |
          STAMP=$(date +'%Y%m%d-%H%M%S')
          echo "BRANCH_NAME=auto/project-result-${STAMP}" >> $GITHUB_ENV

      - name: Create working branch
        run: |
          git switch -c "${BRANCH_NAME}"

      - name: Write target file
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.payload.json').read_text(encoding='utf-8'))
          target = Path(payload['path'])
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(payload['content'], encoding='utf-8')
          PY

      - name: Commit and push
        run: |
          TITLE=$(python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('.payload.json').read_text(encoding='utf-8'))
          print(payload['title'])
          PY
          )

          TARGET_PATH=$(python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('.payload.json').read_text(encoding='utf-8'))
          print(payload['path'])
          PY
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${TARGET_PATH}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add project result: ${TITLE}"
          git push origin "${BRANCH_NAME}"

      - name: Create draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ env.BRANCH_NAME }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('.payload.json').read_text(encoding='utf-8'))
          body = {
              "title": f"[AUTO] {payload['title']}",
              "head": os.environ["BRANCH_NAME"],
              "base": payload["base_branch"],
              "body": "## 반자동 반영 결과\n\n- 제목: {title}\n- 저장 경로: {path}\n- 생성 브랜치: {branch}\n- 반영 방식: project_result_publish\n\n## 체크리스트\n- [ ] 제목 확인\n- [ ] 본문 확인\n- [ ] 파일 경로 확인\n- [ ] 민감정보 포함 여부 확인\n- [ ] merge 여부 결정".format(
                  title=payload['title'],
                  path=payload['path'],
                  branch=os.environ['BRANCH_NAME']
              ),
              "draft": True
          }
          Path('pr.json').write_text(json.dumps(body, ensure_ascii=False), encoding='utf-8')
          PY

          curl -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pulls" \
            --data @pr.json
