# # Seoul Bankruptcy Court Guidelines Summary

## 문서 목적
이 문서는 서울회생법원 실무준칙을 회생·파산 관련 답변과 발행형 콘텐츠에 반영하기 위한 요약 문서이다.  
법령 설명만으로 부족한 부분을 실무상 관점에서 보완하기 위한 내부 기준서로 사용한다.

---

## 1. 기본 이해

서울회생법원 실무준칙은 법률 조문과 동일한 성격은 아니지만,  
실제 절차 운영, 보정, 자료 제출, 심리 흐름에 큰 영향을 줄 수 있는 실무 기준이다.

따라서 회생·파산 관련 콘텐츠를 작성할 때는  
단순히 조문 설명에 그치지 말고  
실제 법원이 어떤 자료를 중요하게 보는지까지 함께 설명해야 한다.

---

## 2. 작성 시 기본 원칙

- 실무준칙은 “무조건적인 결론”으로 쓰지 않는다.
- “실무상”, “법원 운영상”, “실무준칙상 확인되는 경향” 같은 표현으로 쓴다.
- 법률 조문 설명만으로 부족한 부분을 보완하는 방향으로 사용한다.
- 최신 공개본 기준 확인 필요성을 항상 염두에 둔다.

---

## 3. 회생·파산 답변에서 실무준칙을 넣어야 하는 이유

법률상 가능하다는 설명과  
실제 법원에서 요구하는 자료 수준은 다를 수 있다.

예를 들어  
회생은 요건 설명보다도 변제계획의 구체성과 수행 가능성이 중요할 수 있고,  
파산은 지급불능 설명보다도 재산 내역, 최근 처분행위, 채무 경위가 더 문제 되는 경우가 있다.

즉, 실무준칙을 반영하면  
답변이 더 현실적이고 실제 상담에 가까워진다.

---

## 4. 개인회생에서 반영할 포인트

### 핵심
- 계속적 수입 가능성 입증
- 수입·지출 구조 정리
- 재산관계 자료 정리
- 최근 채무 발생 경위 설명
- 변제계획안의 구체성
- 수행 가능성

### 자주 넣을 설명
- 소득자료가 얼마나 안정적인지 설명이 필요하다
- 최근 대출이 늘어난 경우 경위 설명이 중요할 수 있다
- 재산 목록과 지출 구조가 정리되지 않으면 보정이 길어질 수 있다
- 변제계획은 단순한 희망사항이 아니라 실현 가능성이 중요하다

### 블로그/대본용 문장 예시
- “개인회생은 단순히 월급이 있다는 이유만으로 판단되지 않고, 그 소득이 계속될 가능성과 변제계획의 현실성까지 함께 봅니다.”
- “실무상 많이 문제 되는 부분은 최근 채무 증가와 재산 변동 내역입니다.”

---

## 5. 개인파산에서 반영할 포인트

### 핵심
- 파산과 면책은 구분해서 설명
- 면책불허가사유 가능성
- 채무 경위서 중요성
- 최근 처분행위
- 재산 내역 정리
- 편파변제 여부

### 자주 넣을 설명
- 파산선고만 받으면 끝나는 것이 아님
- 면책 여부까지 함께 봐야 함
- 최근 재산 처분이나 특정 채권자 변제는 설명이 필요할 수 있음
- 채무가 생긴 경위를 어떻게 정리하는지가 중요할 수 있음

### 문장 예시
- “개인파산은 파산과 면책을 나눠서 설명해야 하고, 실무상은 면책과 관련된 사정이 더 중요하게 다뤄지는 경우가 많습니다.”
- “최근 재산 처분이나 편파변제가 있었다면 별도 검토가 필요할 수 있습니다.”

---

## 6. 법인회생·기업회생에서 반영할 포인트

### 핵심
- 신청 단계부터 자료 정리 수준이 중요
- 계속기업가치와 청산가치 비교
- 회생계획안 수행 가능성
- 자금흐름
- 거래처 유지 가능성
- 대표이사 또는 신청인 측 협조

### 자주 넣을 설명
- 회생은 신청 자체보다 회생계획 수행 가능성이 중요하다
- 자료가 정리되지 않으면 절차가 늦어질 수 있다
- 대표이사의 자료 제출과 협조가 실무상 매우 중요하다
- 자금계획과 영업 유지 가능성 설명이 필요하다

### 문장 예시
- “기업회생은 제도 이름보다 계속기업가치와 회생계획 수행 가능성이 핵심입니다.”
- “실무에서는 대표이사가 어떤 자료를 얼마나 정리해 두었는지가 절차 진행에 큰 영향을 줍니다.”

---

## 7. 법인파산·기업파산에서 반영할 포인트

### 핵심
- 자료 누락 위험
- 자산 처분 문제
- 회계자료 부실
- 편파변제 의심 가능성
- 파산신청 전후 자산관리
- 대표이사 개인문제와의 구별

### 자주 넣을 설명
- 회계자료가 부실하면 절차가 어려워질 수 있다
- 특정 채권자에게만 먼저 변제한 경우 문제가 될 수 있다
- 자산 처분 내역은 분명하게 정리해야 한다
- 대표이사 개인문제와 법인 문제는 구별하되 함께 점검할 필요가 있다

### 문장 예시
- “법인파산에서는 법률상 요건 설명만큼이나 자료 정리와 자산 처분 내역 정리가 중요합니다.”
- “실무상 많이 문제 되는 부분은 통장 흐름, 회계자료, 편파변제 의심 정황입니다.”

---

## 8. 실무준칙 반영 문장 예시

아래 문장은 글과 대본에 자연스럽게 넣기 좋다.

- “채무자 회생 및 파산에 관한 법률만 볼 것이 아니라, 실제 법원 실무상 어떤 자료가 요구되는지도 함께 보는 편이 안전합니다.”
- “실무에서는 단순히 요건에 해당하는지보다, 이를 설명할 자료가 정리되어 있는지가 중요합니다.”
- “실무준칙과 보정 실무를 보면, 최근 채무 발생 경위나 재산 변동 내역이 분명하지 않으면 절차가 지연될 수 있습니다.”
- “법률상 가능하다는 설명과 실제 법원에서 요구하는 자료 수준은 다를 수 있습니다.”

---

## 9. 금지 문장

아래 문장은 쓰지 않는다.

- 실무준칙상 무조건 이렇게 됩니다
- 법원은 항상 이렇게 판단합니다
- 이 자료만 있으면 반드시 됩니다
- 절차상 예외는 없습니다

---

## 10. 체크포인트

회생·파산 글이나 대본을 쓸 때 아래를 확인한다.

- 관련 조문 설명이 있는가
- 실무준칙상 주의점이 들어갔는가
- 자료 준비 포인트가 들어갔는가
- 보정 가능성 또는 실무상 오해 포인트가 들어갔는가
- 최신 개정 여부 확인 필요성을 인식하고 있는가

---

## 11. 실무준칙 적용 우선순위

### 우선순위가 높은 분야
1. 개인회생
2. 개인파산
3. 법인회생·기업회생
4. 법인파산·기업파산

특히 개인회생·개인파산에서는  
실무준칙 반영 비중을 높게 가져간다.

---

## 12. 결론

실무준칙은 조문을 대체하는 자료가 아니라  
조문 설명을 현실적으로 만들어 주는 자료다.

좋은 회생·파산 콘텐츠는  
“법적으로는 이렇다”에서 끝나지 않고  
“실무상은 무엇을 준비해야 하는가”까지 설명해야 한다.
